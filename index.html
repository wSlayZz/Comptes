<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de comptes — Colocation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --paper:#EFF3EC;
    --paper-raised:#F8FAF6;
    --ink:#1B2E26;
    --ink-soft:#5B6B61;
    --line:#D7DECA;
    --gold:#B5862F;
    --gold-soft:#EADFC5;
    --teal:#2F6F62;
    --teal-soft:#DCEAE3;
    --clay:#A8512F;
    --clay-soft:#F1DFD2;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:2rem 1.25rem 4rem;
  }
  h1,h2,h3{
    font-family:'Fraunces',serif;
    font-weight:600;
    margin:0;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 4px;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:1.75rem;
  }
  .title-row h1{font-size:26px;}
  .names{
    display:flex;
    gap:8px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .avatar{
    width:26px;height:26px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;
    color:var(--paper-raised);
    vertical-align:middle;
    margin-right:4px;
  }
  .av-a{background:var(--teal);}
  .av-d{background:var(--clay);}

  .conn-dot{
    display:inline-block;
    width:7px;height:7px;border-radius:50%;
    background:var(--ink-soft);
    margin-right:5px;
    vertical-align:middle;
  }
  .conn-dot.ok{background:var(--teal);}
  .conn-dot.err{background:var(--clay);}
  .conn-status{
    font-size:11px;color:var(--ink-soft);
    text-align:center;margin-bottom:1rem;
  }

  .scale-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:1.5rem 1.5rem 1.75rem;
    margin-bottom:1.5rem;
  }
  .scale-label{
    text-align:center;
    font-size:14px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .scale-amount{
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:34px;
    font-weight:700;
    margin-bottom:18px;
  }
  .beam-track{
    position:relative;
    height:8px;
    background:var(--line);
    border-radius:4px;
    margin:0 4px 10px;
    overflow:visible;
  }
  .beam-fill{
    position:absolute;
    top:0;bottom:0;
    border-radius:4px;
    transition:left .35s ease, right .35s ease, background .35s ease;
  }
  .beam-mid{
    position:absolute;
    top:-5px;
    left:50%;
    width:2px;height:18px;
    background:var(--ink-soft);
    opacity:.5;
    transform:translateX(-1px);
  }
  .beam-names{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--ink-soft);
    padding:0 2px;
  }

  .section-title{
    font-size:14px;
    color:var(--ink-soft);
    margin:2rem 0 .75rem;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  .form-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:1.25rem;
    margin-bottom:1.5rem;
  }
  .row{display:flex;gap:10px;margin-bottom:10px;}
  .row > div{flex:1;}
  label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  input, select{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
  }
  input:focus, select:focus{
    outline:2px solid var(--teal);
    outline-offset:1px;
  }
  .payer-toggle{
    display:flex;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
  }
  .payer-toggle button{
    flex:1;
    border:none;
    background:#fff;
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .payer-toggle button.active.pa{background:var(--teal-soft);color:var(--teal);font-weight:600;}
  .payer-toggle button.active.pd{background:var(--clay-soft);color:var(--clay);font-weight:600;}

  .split-row{margin-bottom:12px;}
  .split-readout{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--ink-soft);
    font-family:'JetBrains Mono',monospace;
    margin-top:2px;
  }
  input[type="range"]{
    width:100%;
    accent-color:var(--gold);
  }

  .btn-add{
    width:100%;
    background:var(--ink);
    color:var(--paper-raised);
    border:none;
    border-radius:8px;
    padding:11px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-add:active{transform:scale(0.99);}
  .btn-add:disabled{opacity:.5;cursor:default;}

  .ledger{
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:var(--paper-raised);
    overflow:hidden;
  }
  .entry{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
  }
  .entry:last-child{border-bottom:none;}
  .entry .cat{
    width:34px;height:34px;border-radius:9px;
    background:var(--gold-soft);
    color:var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-size:15px;
    flex-shrink:0;
  }
  .entry .meta{flex:1;min-width:0;}
  .entry .desc{font-size:14px;font-weight:500;}
  .entry .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .entry .amt{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    font-weight:700;
    text-align:right;
    white-space:nowrap;
  }
  .entry .del{
    background:none;border:none;color:var(--ink-soft);
    cursor:pointer;font-size:13px;padding:2px 0 0 8px;
  }
  .empty{
    padding:2rem 1rem;
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
  }

  .settle-card{
    margin-top:1.5rem;
    border:1px dashed var(--line);
    border-radius:var(--radius);
    padding:1rem 1.25rem;
  }
  .settle-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
  .settle-row > div:first-child{flex:1;min-width:120px;}
  .btn-settle{
    background:var(--teal);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:9px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }

  .toast{
    position:fixed;
    bottom:24px;left:50%;
    transform:translateX(-50%) translateY(12px);
    background:var(--ink);
    color:var(--paper-raised);
    padding:10px 18px;
    border-radius:30px;
    font-size:13px;
    opacity:0;
    transition:opacity .25s, transform .25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">

  <div class="title-row">
    <div>
      <p class="eyebrow">Vienne · colocation</p>
      <h1>Carnet de comptes</h1>
    </div>
    <div class="names">
      <span><span class="avatar av-a">AG</span>Axel</span>
      <span><span class="avatar av-d">DY</span>Dylan</span>
    </div>
  </div>

  <div class="conn-status">
    <span class="conn-dot" id="connDot"></span><span id="connText">Connexion…</span>
    <button type="button" id="btnRefresh" style="margin-left:8px;background:none;border:none;color:var(--teal);font-size:11px;font-weight:600;cursor:pointer;text-decoration:underline;">Actualiser</button>
  </div>

  <div class="scale-card">
    <div class="scale-label" id="balanceLabel">Chargement…</div>
    <div class="scale-amount" id="balanceAmount">—</div>
    <div class="beam-track">
      <div class="beam-mid"></div>
      <div class="beam-fill" id="beamFill"></div>
    </div>
    <div class="beam-names">
      <span>← Axel doit</span>
      <span>Dylan doit →</span>
    </div>
  </div>

  <div class="section-title">Ajouter une dépense</div>
  <div class="form-card">
    <div class="row">
      <div>
        <label for="desc">Description</label>
        <input id="desc" type="text" placeholder="ex. Assurance habitation">
      </div>
      <div style="max-width:120px;">
        <label for="amount">Montant (€)</label>
        <input id="amount" type="number" step="0.01" min="0" placeholder="0.00">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="category">Catégorie</label>
        <select id="category">
          <option value="loyer">Loyer</option>
          <option value="assurance">Assurance</option>
          <option value="energie">Électricité / gaz</option>
          <option value="internet">Internet</option>
          <option value="abonnement">Abonnement (Netflix...)</option>
          <option value="courses">Courses</option>
          <option value="autre" selected>Autre</option>
        </select>
      </div>
      <div style="max-width:150px;">
        <label for="date">Date</label>
        <input id="date" type="date">
      </div>
    </div>
    <div class="row">
      <div>
        <label>Payé par</label>
        <div class="payer-toggle">
          <button type="button" id="btnPayerA" class="active pa">Axel</button>
          <button type="button" id="btnPayerD" class="pd">Dylan</button>
        </div>
      </div>
    </div>
    <div class="split-row">
      <label for="split">Répartition de la dépense</label>
      <input id="split" type="range" min="0" max="100" step="5" value="50">
      <div class="split-readout">
        <span id="splitA">Axel 50%</span>
        <span id="splitD">Dylan 50%</span>
      </div>
    </div>
    <button class="btn-add" id="btnAdd">Ajouter au carnet</button>
  </div>

  <div class="section-title">Historique</div>
  <div class="ledger" id="ledger">
    <div class="empty">Chargement…</div>
  </div>

  <div class="settle-card">
    <div class="section-title" style="margin-top:0;">Enregistrer un remboursement</div>
    <div class="settle-row">
      <div>
        <label for="settleAmount">Montant remboursé (€)</label>
        <input id="settleAmount" type="number" step="0.01" min="0" placeholder="0.00">
      </div>
      <button class="btn-settle" id="btnSettleDtoA">Dylan → Axel</button>
      <button class="btn-settle" id="btnSettleAtoD">Axel → Dylan</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://exqejtuiwsdkxrspyznx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4cWVqdHVpd3Nka3hyc3B5em54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjU3MzYsImV4cCI6MjA5ODMwMTczNn0.XRlPOuGzKhK9NXNRiNSdx0yI9L7EdLQVa6kPOu2Y9nA';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let rows = [];

const catIcons = {
  loyer:'🏠', assurance:'🛡', energie:'⚡', internet:'📶',
  abonnement:'📺', courses:'🛒', autre:'🧾'
};
const catLabels = {
  loyer:'Loyer', assurance:'Assurance', energie:'Électricité / gaz',
  internet:'Internet', abonnement:'Abonnement', courses:'Courses', autre:'Autre'
};

let currentPayer = 'axel';
document.getElementById('date').valueAsDate = new Date();

document.getElementById('btnPayerA').addEventListener('click', () => setPayer('axel'));
document.getElementById('btnPayerD').addEventListener('click', () => setPayer('dylan'));

function setPayer(p){
  currentPayer = p;
  document.getElementById('btnPayerA').classList.toggle('active', p === 'axel');
  document.getElementById('btnPayerD').classList.toggle('active', p === 'dylan');
}

const splitInput = document.getElementById('split');
splitInput.addEventListener('input', updateSplitReadout);
function updateSplitReadout(){
  const a = parseInt(splitInput.value, 10);
  document.getElementById('splitA').textContent = 'Axel ' + a + '%';
  document.getElementById('splitD').textContent = 'Dylan ' + (100 - a) + '%';
}
updateSplitReadout();

function fmt(n){
  return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

function computeBalance(){
  let balance = 0;
  for(const e of rows){
    if(e.type === 'settlement'){
      balance += Number(e.signed_amount);
      continue;
    }
    const amount = Number(e.amount);
    const splitAxel = e.split_axel ?? 50;
    const axelShare = amount * (splitAxel / 100);
    const dylanShare = amount - axelShare;
    if(e.payer === 'axel'){
      balance += dylanShare;
    } else {
      balance -= axelShare;
    }
  }
  return balance;
}

function renderBalance(){
  const balance = computeBalance();
  const label = document.getElementById('balanceLabel');
  const amount = document.getElementById('balanceAmount');
  const fill = document.getElementById('beamFill');

  if(Math.abs(balance) < 0.005){
    label.textContent = 'Vous êtes à jour';
    amount.textContent = '0,00 €';
    amount.style.color = 'var(--ink-soft)';
    fill.style.left = '50%';
    fill.style.right = '50%';
    fill.style.background = 'var(--ink-soft)';
  } else if(balance > 0){
    label.textContent = 'Dylan doit à Axel';
    amount.textContent = fmt(balance);
    amount.style.color = 'var(--teal)';
    fill.style.background = 'var(--teal)';
    fill.style.left = '50%';
    fill.style.right = '4px';
  } else {
    label.textContent = 'Axel doit à Dylan';
    amount.textContent = fmt(Math.abs(balance));
    amount.style.color = 'var(--clay)';
    fill.style.background = 'var(--clay)';
    fill.style.left = '4px';
    fill.style.right = '50%';
  }
}

function renderLedger(){
  const ledger = document.getElementById('ledger');
  if(rows.length === 0){
    ledger.innerHTML = '<div class="empty">Aucune dépense enregistrée pour l\'instant.</div>';
    return;
  }
  const sorted = [...rows].sort((a,b) => {
    const da = a.expense_date || a.created_at || '';
    const db = b.expense_date || b.created_at || '';
    return db.localeCompare(da) || (b.id - a.id);
  });
  ledger.innerHTML = sorted.map(e => {
    if(e.type === 'settlement'){
      const dateStr = e.expense_date ? new Date(e.expense_date).toLocaleDateString('fr-FR') : '';
      return `<div class="entry">
        <div class="cat">↻</div>
        <div class="meta">
          <div class="desc">${e.label}</div>
          <div class="sub">${dateStr} · remboursement</div>
        </div>
        <div class="amt">${fmt(Number(e.amount))}</div>
        <button class="del" data-id="${e.id}" aria-label="Supprimer">✕</button>
      </div>`;
    }
    const dateStr = e.expense_date ? new Date(e.expense_date).toLocaleDateString('fr-FR') : '';
    const payerLabel = e.payer === 'axel' ? 'Axel' : 'Dylan';
    const splitAxel = e.split_axel ?? 50;
    const splitStr = splitAxel === 50 ? '50/50' : `Axel ${splitAxel}% · Dylan ${100-splitAxel}%`;
    return `<div class="entry">
      <div class="cat">${catIcons[e.category] || '🧾'}</div>
      <div class="meta">
        <div class="desc">${e.description || catLabels[e.category] || 'Dépense'}</div>
        <div class="sub">${dateStr} · payé par ${payerLabel} · ${splitStr}</div>
      </div>
      <div class="amt">${fmt(Number(e.amount))}</div>
      <button class="del" data-id="${e.id}" aria-label="Supprimer">✕</button>
    </div>`;
  }).join('');

  ledger.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', () => removeEntry(parseInt(btn.dataset.id, 10)));
  });
}

function renderAll(){
  renderBalance();
  renderLedger();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function setConnStatus(ok, text){
  document.getElementById('connDot').className = 'conn-dot ' + (ok === null ? '' : ok ? 'ok' : 'err');
  document.getElementById('connText').textContent = text;
}

async function loadAll(){
  setConnStatus(null, 'Connexion…');
  const { data, error } = await sb.from('expenses').select('*').order('created_at', { ascending: false });
  if(error){
    setConnStatus(false, 'Connexion impossible — vérifie l\'URL et la clé Supabase');
    console.error(error);
    return;
  }
  rows = data;
  setConnStatus(true, 'Synchronisé');
  renderAll();
}

document.getElementById('btnAdd').addEventListener('click', async () => {
  const description = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const category = document.getElementById('category').value;
  const expense_date = document.getElementById('date').value;
  const split_axel = parseInt(splitInput.value, 10);

  if(!amount || amount <= 0){
    showToast('Indique un montant valide');
    return;
  }

  const { error } = await sb.from('expenses').insert({
    type: 'expense',
    description, amount, category, expense_date,
    payer: currentPayer,
    split_axel
  });

  if(error){
    showToast('Erreur d\'enregistrement');
    console.error(error);
    return;
  }

  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  splitInput.value = 50;
  updateSplitReadout();
  showToast('Dépense ajoutée');
  loadAll();
});

async function removeEntry(id){
  const { error } = await sb.from('expenses').delete().eq('id', id);
  if(error){
    showToast('Erreur de suppression');
    return;
  }
  showToast('Supprimé');
  loadAll();
}

document.getElementById('btnSettleDtoA').addEventListener('click', () => addSettlement('dylan-to-axel'));
document.getElementById('btnSettleAtoD').addEventListener('click', () => addSettlement('axel-to-dylan'));

async function addSettlement(direction){
  const amount = parseFloat(document.getElementById('settleAmount').value);
  if(!amount || amount <= 0){
    showToast('Indique un montant valide');
    return;
  }
  const today = new Date().toISOString().slice(0,10);
  const signed_amount = direction === 'dylan-to-axel' ? -amount : amount;
  const label = direction === 'dylan-to-axel'
    ? 'Dylan a remboursé Axel'
    : 'Axel a remboursé Dylan';

  const { error } = await sb.from('expenses').insert({
    type: 'settlement',
    label, amount, signed_amount,
    expense_date: today
  });

  if(error){
    showToast('Erreur d\'enregistrement');
    console.error(error);
    return;
  }

  document.getElementById('settleAmount').value = '';
  showToast('Remboursement enregistré');
  loadAll();
}

document.getElementById('btnRefresh').addEventListener('click', loadAll);

loadAll();
</script>
</body>
</html>
